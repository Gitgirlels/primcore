<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Primcore Studio — Digital Downloads</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet"/>
<style>
  @font-face {
    font-family: 'SuperMaples';
    src: url('data:font/truetype;base64,AAEAAAASAQAABAAgRFNJRwAAAAIAAyEwAAAACEdERUYEbgLUAALd9AAAAChHUE9TAXwIPgAC3hwAAEMER1NVQgAZAAwAAyEgAAAAEE9TLzJFHmNGAAABqAAAAGBjbWFwQYmYFwAACOQAAAX4Y3Z0ICtXGrAAAB8kAAAAZGZwZ22DpVxaAAAO3AAAD39nYXNwAAAAEAAC') format('truetype');
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#f9f6f0;font-family:'SuperMaples','Fredoka One',cursive;min-height:100vh;}
  .page{max-width:860px;margin:0 auto;padding:2rem 1.5rem 4rem;}
  .s{font-family:'SuperMaples','Fredoka One',cursive;}
  .hdr{background:#FF6B6B;border:4px solid #1a1a1a;border-radius:24px;margin-bottom:1.5rem;overflow:hidden;}
  .hdr-top{padding:1.25rem 1.5rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:4px solid #1a1a1a;}
  .brand{font-size:34px;color:white;letter-spacing:2px;line-height:1;text-shadow:3px 3px 0 #1a1a1a;}
  .brand-sub{font-size:12px;color:#FFE8E8;margin-top:4px;letter-spacing:1px;}
  .cart-pill{display:flex;align-items:center;gap:8px;background:#1a1a1a;color:#FFEAA7;border:none;border-radius:50px;padding:10px 20px;cursor:pointer;font-family:'SuperMaples','Fredoka One',cursive;font-size:16px;letter-spacing:1px;transition:transform 0.12s;}
  .cart-pill:hover{transform:scale(1.06);}
  .bubble{background:#FFEAA7;color:#1a1a1a;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-family:'SuperMaples','Fredoka One',cursive;}
  .nav{display:flex;align-items:stretch;background:#FFE66D;}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 6px;cursor:pointer;border-right:3px solid #1a1a1a;font-size:12px;color:#1a1a1a;transition:background 0.12s;letter-spacing:0.5px;font-family:'SuperMaples','Fredoka One',cursive;}
  .nav-item:last-child{border-right:none;}
  .nav-item:hover{background:#FFD93D;}
  .nav-item.on{background:#1a1a1a;color:#FFE66D;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px;margin-bottom:1.5rem;}
  .card{border:3.5px solid #1a1a1a;border-radius:20px;overflow:hidden;background:white;cursor:pointer;transition:transform 0.12s;}
  .card:hover{transform:translateY(-4px) rotate(-0.5deg);}
  .thumb{width:100%;aspect-ratio:1/1.05;display:flex;align-items:center;justify-content:center;border-bottom:3.5px solid #1a1a1a;position:relative;overflow:hidden;}
  .nb{position:absolute;top:9px;left:9px;font-size:10px;background:#FF6B6B;color:white;border:2.5px solid #1a1a1a;border-radius:50px;padding:2px 10px;letter-spacing:1px;z-index:2;font-family:'SuperMaples','Fredoka One',cursive;}
  .ci{padding:12px 14px 14px;}
  .ccat{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:#888;margin-bottom:3px;font-family:sans-serif;}
  .cname{font-size:15px;color:#1a1a1a;line-height:1.25;margin-bottom:10px;letter-spacing:0.5px;}
  .cfoot{display:flex;align-items:center;justify-content:space-between;}
  .price{font-size:20px;color:#1a1a1a;}
  .abtn{width:34px;height:34px;border-radius:50%;border:2.5px solid #1a1a1a;background:white;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;color:#1a1a1a;font-family:'SuperMaples','Fredoka One',cursive;transition:all 0.12s;}
  .abtn:hover{background:#1a1a1a;color:white;}
  .abtn.done{background:#1D9E75;border-color:#1D9E75;color:white;}
  .divider{height:4px;background:#1a1a1a;border-radius:2px;margin:2rem 0;}
  .cp{border:4px solid #1a1a1a;border-radius:24px;overflow:hidden;}
  .cp-hdr{background:#A29BFE;padding:1rem 1.5rem;border-bottom:4px solid #1a1a1a;}
  .cp-hdr h3{font-size:24px;color:#1a1a1a;letter-spacing:1px;}
  .cp-body{padding:1.25rem 1.5rem 1.5rem;background:white;}
  .ecart{text-align:center;padding:1.5rem 0;font-size:14px;color:#aaa;letter-spacing:0.5px;}
  .citem{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:2.5px dashed #e0e0e0;}
  .cin{font-size:14px;color:#1a1a1a;}
  .csub{font-size:11px;color:#aaa;font-family:sans-serif;}
  .cpr{font-size:15px;color:#1a1a1a;}
  .ctrow{display:flex;justify-content:space-between;align-items:baseline;padding:14px 0 0;}
  .ctl{font-size:12px;color:#888;font-family:sans-serif;}
  .cta{font-size:28px;color:#1a1a1a;}
  .ckbtn{width:100%;margin-top:1rem;padding:14px;background:#FF6B6B;color:white;border:3.5px solid #1a1a1a;border-radius:50px;font-size:17px;font-family:'SuperMaples','Fredoka One',cursive;cursor:pointer;letter-spacing:1px;transition:transform 0.1s;text-shadow:1px 1px 0 rgba(0,0,0,0.2);}
  .ckbtn:hover{transform:scale(1.02);}
  .pnote{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:11px;font-family:sans-serif;color:#aaa;justify-content:center;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;padding:1rem;}
  .modal-overlay.open{display:flex;}
  .modal{background:white;border:4px solid #1a1a1a;border-radius:24px;max-width:460px;width:100%;padding:2rem;position:relative;}
  .modal-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:#1a1a1a;}
  .modal-kanji{font-size:80px;text-align:center;margin:0.5rem 0 1rem;color:#3C3489;}
  .modal-title{font-size:20px;margin-bottom:0.5rem;}
  .modal-meta{font-size:13px;color:#555;font-family:sans-serif;line-height:1.6;}
  .modal-add{width:100%;margin-top:1.5rem;padding:12px;background:#FF6B6B;color:white;border:3px solid #1a1a1a;border-radius:50px;font-size:16px;font-family:'SuperMaples','Fredoka One',cursive;cursor:pointer;letter-spacing:1px;}
  .modal-add:hover{transform:scale(1.02);}
  @media(max-width:480px){
    .brand{font-size:24px;}
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
    .hdr-top{flex-direction:column;gap:12px;align-items:flex-start;}
  }
</style>
</head>
<body>
<div class="page s">
  <div class="hdr">
    <div class="hdr-top">
      <div>
        <div class="brand">Primcore Studio</div>
        <div class="brand-sub">instant PDF downloads · print at home</div>
      </div>
      <button class="cart-pill" onclick="goCart()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Cart <span class="bubble" id="cc">0</span>
      </button>
    </div>
    <div class="nav" id="nav">
      <div class="nav-item on" onclick="filt('all',this)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        All
      </div>
      <div class="nav-item" onclick="filt('patterns',this)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 3l2 6h6l-5 4 2 6-5-4-5 4 2-6-5-4h6z"/></svg>
        Patterns
      </div>
      <div class="nav-item" onclick="filt('worksheets',this)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>
        Worksheets
      </div>
      <div class="nav-item" onclick="filt('planners',this)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
        Planners
      </div>
      <div class="nav-item" onclick="filt('wall-art',this)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        Wall Art
      </div>
    </div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="divider"></div>

  <div class="cp">
    <div class="cp-hdr"><h3>Your cart</h3></div>
    <div class="cp-body">
      <div id="ecart" class="ecart">Nothing here yet — add something!</div>
      <div id="clist"></div>
      <div class="ctrow" id="ctrow" style="display:none">
        <span class="ctl">Total</span>
        <span class="cta" id="ctamt">$0</span>
      </div>
      <button class="ckbtn" id="ckbtn" style="display:none" onclick="checkout()">Checkout with Stripe →</button>
      <div class="pnote" id="pnote" style="display:none">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        Secure checkout · Instant PDF delivery
      </div>
    </div>
  </div>
</div>

<!-- Product modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">✕</button>
    <div id="modal-thumb"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-meta" id="modal-meta"></div>
    <button class="modal-add" id="modal-add">Add to cart</button>
  </div>
</div>

<script>
function kanjiThumb(){
  return `<svg width="140" height="140" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="8" y="8" width="124" height="124" rx="6" fill="white" stroke="#3C3489" stroke-width="2.5"/>
    <line x1="8" y1="70" x2="132" y2="70" stroke="#3C3489" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="70" y1="8" x2="70" y2="132" stroke="#3C3489" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="70" y="88" text-anchor="middle" font-size="62" fill="#3C3489" font-family="serif">日</text>
    <rect x="18" y="18" width="30" height="30" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
    <text x="33" y="39" text-anchor="middle" font-size="18" fill="#534AB7" font-family="serif">水</text>
    <rect x="92" y="18" width="30" height="30" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
    <text x="107" y="39" text-anchor="middle" font-size="18" fill="#534AB7" font-family="serif">火</text>
    <rect x="18" y="92" width="30" height="30" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
    <text x="33" y="113" text-anchor="middle" font-size="18" fill="#534AB7" font-family="serif">木</text>
    <rect x="92" y="92" width="30" height="30" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
    <text x="107" y="113" text-anchor="middle" font-size="18" fill="#534AB7" font-family="serif">山</text>
  </svg>`;
}

const svgShapes=[
  c=>`<svg width="72" height="72" viewBox="0 0 48 48" fill="none" stroke="${c}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 20h20l-3 18H17L14 20z"/><path d="M19 20c0-3.5 2.2-7 5-7s5 3.5 5 7"/><circle cx="24" cy="30" r="2.5" fill="${c}"/></svg>`,
  c=>`<svg width="72" height="72" viewBox="0 0 48 48" fill="none" stroke="${c}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14h18l7 24H8L15 14z"/><line x1="15" y1="14" x2="33" y2="14"/></svg>`,
  c=>`<svg width="72" height="72" viewBox="0 0 48 48" fill="none" stroke="${c}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="10" y="8" width="28" height="32" rx="4"/><polyline points="17,21 20,24 27,17"/><polyline points="17,30 20,33 27,26"/></svg>`,
  c=>`<svg width="72" height="72" viewBox="0 0 48 48" fill="none" stroke="${c}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="12" width="32" height="28" rx="4"/><line x1="8" y1="20" x2="40" y2="20"/><line x1="17" y1="8" x2="17" y2="16"/><line x1="31" y1="8" x2="31" y2="16"/><circle cx="24" cy="30" r="3" fill="${c}"/></svg>`,
  c=>`<svg width="72" height="72" viewBox="0 0 48 48" fill="none" stroke="${c}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="24" cy="24" r="5" fill="${c}" opacity="0.3"/><circle cx="24" cy="24" r="5"/><ellipse cx="24" cy="14" rx="4" ry="6"/><ellipse cx="24" cy="34" rx="4" ry="6"/><ellipse cx="14" cy="24" rx="6" ry="4"/><ellipse cx="34" cy="24" rx="6" ry="4"/></svg>`,
  c=>`<svg width="72" height="72" viewBox="0 0 48 48" fill="none" stroke="${c}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="8" width="32" height="32" rx="4"/><rect x="14" y="14" width="20" height="20" rx="2"/><path d="M14 28l6-6 5 5 3-3 6 6"/></svg>`,
  c=>`<svg width="72" height="72" viewBox="0 0 48 48" fill="none" stroke="${c}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="24" cy="24" r="14"/><path d="M24 14v20M19 18h7a3 3 0 010 6h-4a3 3 0 010 6h7"/></svg>`,
  c=>`<svg width="72" height="72" viewBox="0 0 48 48" fill="none" stroke="${c}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M24 6l4.5 9.5L39 17l-7.5 7.5 1.5 11-9-5-9 5 1.5-11L9 17l10.5-1.5z"/></svg>`,
];

const thumbColors=[
  {bg:'#EEEDFE',dot:'#534AB7'},
  {bg:'#FFF3B0',dot:'#412402'},
  {bg:'#FFDDE1',dot:'#72243E'},
  {bg:'#D4F1C4',dot:'#27500A'},
  {bg:'#DDD6FE',dot:'#3C3489'},
  {bg:'#C7F2E8',dot:'#085041'},
  {bg:'#BFE9FF',dot:'#0C447C'},
  {bg:'#FFE8C8',dot:'#633806'},
  {bg:'#F9D0F5',dot:'#72243E'},
];

const products=[
  {id:9,stripeId:'apron-pattern',name:'Gathering apron sewing pattern',cat:'patterns',price:11,ti:0,isNew:false,type:'apron',
   desc:'Gardening apron with gathered waist and harvest pouch. Includes cut pieces, 8-step illustrated instructions, materials list. Beginner-friendly — no zips or tricky techniques. Finished size: 70×50cm.'},
  {id:10,stripeId:'kanji-n4',name:'Japanese kanji practice worksheets',cat:'worksheets',price:6,ti:0,isNew:true,type:'kanji',
   desc:'104 JLPT N4 kanji across 11 printable pages (10 per page). Each card includes: large kanji with stroke count, ON/kun readings, stroke order guide, and 6 practice squares with trace guide.'},
  {id:1,stripeId:'outfit-colouring',name:'outfit colouring',cat:'patterns',price:8,ti:1,isNew:false,type:'svg',
   desc:'Classic gathered tote with wide base and sturdy handles. Beginner friendly. Includes full measurements and seam allowance. Great for fabric scraps.'},
  {id:2,stripeId:'skirt-pattern',name:'A-line skirt PDF pattern',cat:'patterns',price:9,ti:2,isNew:false,type:'svg',
   desc:'Simple A-line skirt pattern with elastic waistband. Multiple sizes included. Perfect first garment project.'},
  {id:3,stripeId:'habit-tracker',name:'Daily habit tracker',cat:'worksheets',price:4,ti:3,isNew:false,type:'svg',
   desc:'31-day habit tracker with 10 habit slots. Clean minimal layout. Print monthly and track streaks.'},
  {id:4,stripeId:'meal-planner',name:'Weekly meal planner',cat:'planners',price:5,ti:4,isNew:false,type:'svg',
   desc:'7-day meal planner with breakfast, lunch, dinner, and snacks. Includes shopping list section.'},
  {id:5,stripeId:'stitch-sampler',name:'Floral stitch sampler',cat:'patterns',price:12,ti:5,isNew:false,type:'svg',
   desc:'Embroidery sampler featuring 12 classic floral motifs. Includes stitch guide and thread colour suggestions.'},
  {id:6,stripeId:'fern-print',name:'Botanical print — fern',cat:'wall-art',price:6,ti:6,isNew:false,type:'svg',
   desc:'Minimalist botanical fern illustration. Prints beautifully at A4 or A3. Perfect for gallery walls.'},
  {id:7,stripeId:'budget-bundle',name:'Budget worksheet bundle',cat:'worksheets',price:7,ti:7,isNew:false,type:'svg',
   desc:'5-page bundle: monthly budget overview, expense tracker, savings goal sheet, debt payoff planner, and net worth tracker.'},
  {id:8,stripeId:'goals-planner',name:'Monthly goals planner',cat:'planners',price:5,ti:8,isNew:false,type:'svg',
   desc:'One-page monthly goals planner with priority ranking, action steps, and reflection section.'},
];

let cart=[],curFilt='all';

function getThumbHtml(p){
  if(p.type==='apron') return {bg:'#F5F0E8',html:`<img src="ChatGPT_Image_Apr_28__2026__10_33_33_AM.png" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">`};
  if(p.type==='kanji') return {bg:'#EEEDFE',html:kanjiThumb()};
  const tc=thumbColors[p.ti];
  return {bg:tc.bg,html:svgShapes[p.ti](tc.dot)};
}

function renderGrid(f){
  const g=document.getElementById('grid');
  const list=f==='all'?products:products.filter(p=>p.cat===f);
  g.innerHTML=list.map(p=>{
    const inCart=!!cart.find(c=>c.id===p.id);
    const {bg,html}=getThumbHtml(p);
    return `<div class="card" onclick="openModal(${p.id})">
      <div class="thumb" style="background:${bg}">${html}${p.isNew?'<span class="nb">NEW</span>':''}</div>
      <div class="ci">
        <div class="ccat">${p.cat.replace('-',' ')}</div>
        <div class="cname">${p.name}</div>
        <div class="cfoot">
          <span class="price">$${p.price}</span>
          <button class="abtn${inCart?' done':''}" onclick="event.stopPropagation();addC(${p.id})">${inCart?'✓':'+'}</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openModal(id){
  const p=products.find(x=>x.id===id);
  const {bg,html}=getThumbHtml(p);
  document.getElementById('modal-thumb').innerHTML=`<div style="background:${bg};border-radius:12px;padding:1.5rem;text-align:center;margin-bottom:1rem;">${html}</div>`;
  document.getElementById('modal-title').textContent=p.name+' — $'+p.price;
  document.getElementById('modal-meta').innerHTML=`<strong>Category:</strong> ${p.cat}<br><br>${p.desc}`;
  const btn=document.getElementById('modal-add');
  const inCart=!!cart.find(c=>c.id===id);
  btn.textContent=inCart?'Already in cart ✓':'Add to cart';
  btn.onclick=()=>{addC(id);document.getElementById('modal').classList.remove('open');};
  document.getElementById('modal').classList.add('open');
}

function closeModal(e){
  if(e.target===document.getElementById('modal')) document.getElementById('modal').classList.remove('open');
}

function filt(f,btn){
  curFilt=f;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderGrid(f);
}

function addC(id){
  if(!cart.find(c=>c.id===id)){
    cart.push(products.find(p=>p.id===id));
    renderGrid(curFilt);
    renderCart();
    document.getElementById('cc').textContent=cart.length;
  }
}

function renderCart(){
  const ec=document.getElementById('ecart'),cl=document.getElementById('clist'),
    tr=document.getElementById('ctrow'),cb=document.getElementById('ckbtn'),pn=document.getElementById('pnote');
  if(!cart.length){ec.style.display='block';cl.innerHTML='';tr.style.display='none';cb.style.display='none';pn.style.display='none';return;}
  ec.style.display='none';
  cl.innerHTML=cart.map(p=>`<div class="citem"><div><div class="cin">${p.name}</div><div class="csub">PDF download · instant delivery</div></div><span class="cpr">$${p.price}</span></div>`).join('');
  document.getElementById('ctamt').textContent='$'+cart.reduce((s,p)=>s+p.price,0);
  tr.style.display='flex';cb.style.display='block';pn.style.display='flex';
}

function goCart(){document.querySelector('.cp').scrollIntoView({behavior:'smooth',block:'start'});}

function checkout(){
  if(!cart.length) return;
  const items = cart.map(p => ({ id: p.stripeId }));
  fetch('/create-checkout-session', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ items })
  })
  .then(r => r.json())
  .then(data => {
    if(data.url) window.location.href = data.url;
    else alert('Checkout error: ' + (data.error || 'unknown'));
  })
  .catch(err => alert('Network error. Is the server running?'));
}

renderGrid('all');
renderCart();
</script>
</body>
</html>
