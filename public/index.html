<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Primcore Studio — Digital Downloads</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet"/>
<style>
  @font-face {
    font-family: 'SuperMaples';
    src: url('data:font/truetype;base64,AAEAAAASAQAABAAgRFNJRwAAAAIAAyEwAAAACEdERUYEbgLUAALd9AAAAChHUE9TAXwIPgAC3hwAAEMER1NVQgAZAAwAAyEgAAAAEE9TLzJFHmNGAAABqAAAAGBjbWFwQYmYFwAACOQAAAX4Y3Z0ICtXGrAAAB8kAAAAZGZwZ22DpVxaAAAO3AAAD39nYXNwAAAAEAAC') format('truetype');
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#f9f6f0;font-family:'SuperMaples','Fredoka One',cursive;min-height:100vh;}
  .page{max-width:860px;margin:0 auto;padding:2rem 1.5rem 4rem;}
  .s{font-family:'SuperMaples','Fredoka One',cursive;}

  /* ── Header ── */
  .hdr{background:#FF6B6B;border:4px solid #1a1a1a;border-radius:24px;margin-bottom:1.5rem;overflow:hidden;}
  .hdr-top{padding:1.25rem 1.5rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:4px solid #1a1a1a;}
  .brand{font-size:34px;color:white;letter-spacing:2px;line-height:1;text-shadow:3px 3px 0 #1a1a1a;}
  .brand-sub{font-size:12px;color:#FFE8E8;margin-top:4px;letter-spacing:1px;}
  .cart-pill{display:flex;align-items:center;gap:8px;background:#1a1a1a;color:#FFEAA7;border:none;border-radius:50px;padding:10px 20px;cursor:pointer;font-family:'SuperMaples','Fredoka One',cursive;font-size:16px;letter-spacing:1px;transition:transform 0.12s;}
  .cart-pill:hover{transform:scale(1.06);}
  .bubble{background:#FFEAA7;color:#1a1a1a;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;}

  /* ── Nav ── */
  .nav{display:flex;align-items:stretch;background:#FFE66D;overflow-x:auto;}
  .nav-item{flex:1;min-width:72px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 6px;cursor:pointer;border-right:3px solid #1a1a1a;font-size:11px;color:#1a1a1a;transition:background 0.12s;letter-spacing:0.5px;font-family:'SuperMaples','Fredoka One',cursive;white-space:nowrap;}
  .nav-item:last-child{border-right:none;}
  .nav-item:hover{background:#FFD93D;}
  .nav-item.on{background:#1a1a1a;color:#FFE66D;}

  /* ── Product grid ── */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px;margin-bottom:1.5rem;}
  .card{border:3.5px solid #1a1a1a;border-radius:20px;overflow:hidden;background:white;cursor:pointer;transition:transform 0.12s;}
  .card:hover{transform:translateY(-4px) rotate(-0.5deg);}
  .thumb{width:100%;aspect-ratio:1/1.05;border-bottom:3.5px solid #1a1a1a;position:relative;overflow:hidden;}
  .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
  .nb{position:absolute;top:9px;left:9px;font-size:10px;background:#FF6B6B;color:white;border:2.5px solid #1a1a1a;border-radius:50px;padding:2px 10px;letter-spacing:1px;z-index:2;}
  .ci{padding:12px 14px 14px;}
  .ccat{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:#888;margin-bottom:3px;font-family:sans-serif;}
  .cname{font-size:15px;color:#1a1a1a;line-height:1.25;margin-bottom:10px;letter-spacing:0.5px;}
  .cfoot{display:flex;align-items:center;justify-content:space-between;}
  .price{font-size:20px;color:#1a1a1a;}
  .abtn{width:34px;height:34px;border-radius:50%;border:2.5px solid #1a1a1a;background:white;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;color:#1a1a1a;transition:all 0.12s;}
  .abtn:hover{background:#1a1a1a;color:white;}
  .abtn.done{background:#1D9E75;border-color:#1D9E75;color:white;}

  /* ── Divider ── */
  .divider{height:4px;background:#1a1a1a;border-radius:2px;margin:2rem 0;}

  /* ── Cart panel ── */
  .cp{border:4px solid #1a1a1a;border-radius:24px;overflow:hidden;}
  .cp-hdr{background:#A29BFE;padding:1rem 1.5rem;border-bottom:4px solid #1a1a1a;}
  .cp-hdr h3{font-size:24px;color:#1a1a1a;letter-spacing:1px;}
  .cp-body{padding:1.25rem 1.5rem 1.5rem;background:white;}
  .ecart{text-align:center;padding:1.5rem 0;font-size:14px;color:#aaa;letter-spacing:0.5px;}
  .citem{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:2.5px dashed #e0e0e0;}
  .cin{font-size:14px;color:#1a1a1a;}
  .csub{font-size:11px;color:#aaa;font-family:sans-serif;}
  .cpr{font-size:15px;color:#1a1a1a;}
  .ctrow{display:flex;justify-content:space-between;align-items:baseline;padding:14px 0 0;}
  .ctl{font-size:12px;color:#888;font-family:sans-serif;}
  .cta{font-size:28px;color:#1a1a1a;}
  .ckbtn{width:100%;margin-top:1rem;padding:14px;background:#FF6B6B;color:white;border:3.5px solid #1a1a1a;border-radius:50px;font-size:17px;font-family:'SuperMaples','Fredoka One',cursive;cursor:pointer;letter-spacing:1px;transition:transform 0.1s;text-shadow:1px 1px 0 rgba(0,0,0,0.2);}
  .ckbtn:hover{transform:scale(1.02);}
  .pnote{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:11px;font-family:sans-serif;color:#aaa;justify-content:center;}

  /* ══════════════════════════════════════════════
     PRODUCT DRAWER  (slides up from bottom)
  ══════════════════════════════════════════════ */
  .drawer-overlay{
    display:none;position:fixed;inset:0;
    background:rgba(10,10,10,0.55);
    z-index:200;
    align-items:flex-end;
    justify-content:center;
    padding:0;
  }
  .drawer-overlay.open{display:flex;}

  .drawer{
    background:#f9f6f0;
    border:4px solid #1a1a1a;
    border-bottom:none;
    border-radius:28px 28px 0 0;
    width:100%;
    max-width:640px;
    max-height:92vh;
    overflow-y:auto;
    position:relative;
    transform:translateY(100%);
    transition:transform 0.32s cubic-bezier(0.22,1,0.36,1);
    padding-bottom:2rem;
  }
  .drawer-overlay.open .drawer{transform:translateY(0);}

  /* drag handle */
  .drawer-handle{
    width:44px;height:5px;
    background:#ccc;border-radius:3px;
    margin:14px auto 0;
  }

  /* close btn */
  .drawer-close{
    position:absolute;top:16px;right:18px;
    background:#1a1a1a;color:white;border:none;
    width:32px;height:32px;border-radius:50%;
    font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    z-index:10;
  }

  /* ── A4 image carousel ── */
  .carousel{
    position:relative;
    width:100%;
    /* A4 ratio 1:√2 ≈ 1:1.414 */
    aspect-ratio: 1 / 1.414;
    background:#e8e4dc;
    overflow:hidden;
    border-bottom:3.5px solid #1a1a1a;
    cursor:grab;
    user-select:none;
  }
  .carousel:active{cursor:grabbing;}
  .carousel-track{
    display:flex;
    height:100%;
    transition:transform 0.3s cubic-bezier(0.25,1,0.5,1);
    will-change:transform;
  }
  .carousel-slide{
    flex:0 0 100%;
    height:100%;
    position:relative;
  }
  .carousel-slide img{
    position:absolute;inset:0;
    width:100%;height:100%;
    object-fit:contain; /* show full A4 page, no crop */
    display:block;
    background:#f0ece4;
  }

  /* arrow buttons */
  .car-btn{
    position:absolute;top:50%;transform:translateY(-50%);
    background:white;border:2.5px solid #1a1a1a;
    width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;z-index:5;font-size:14px;
    transition:background 0.1s;box-shadow:2px 2px 0 #1a1a1a;
  }
  .car-btn:hover{background:#FFE66D;}
  .car-prev{left:10px;}
  .car-next{right:10px;}
  .car-btn.hidden{display:none;}

  /* dot indicators */
  .car-dots{
    position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
    display:flex;gap:6px;
  }
  .car-dot{
    width:7px;height:7px;border-radius:50%;
    background:rgba(26,26,26,0.25);border:1.5px solid #1a1a1a;
    cursor:pointer;transition:background 0.15s;
  }
  .car-dot.on{background:#1a1a1a;}

  /* page counter pill */
  .car-counter{
    position:absolute;top:10px;right:10px;
    background:rgba(26,26,26,0.7);color:white;
    font-size:11px;font-family:sans-serif;
    padding:3px 9px;border-radius:20px;letter-spacing:0.5px;
  }

  /* ── Drawer body ── */
  .drawer-body{padding:1.25rem 1.5rem 0.5rem;}

  /* category + NEW badge row */
  .drawer-meta-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
  .d-cat{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:#888;font-family:sans-serif;}
  .d-new{font-size:10px;background:#FF6B6B;color:white;border:2px solid #1a1a1a;border-radius:30px;padding:2px 9px;letter-spacing:1px;}

  /* title + price row */
  .drawer-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1rem;}
  .drawer-title{font-size:22px;color:#1a1a1a;line-height:1.2;letter-spacing:0.5px;flex:1;}
  .drawer-price{font-size:30px;color:#1a1a1a;white-space:nowrap;line-height:1;}

  /* tag pills */
  .drawer-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem;}
  .dtag{
    display:inline-flex;align-items:center;gap:5px;
    font-size:11px;font-family:sans-serif;
    background:white;border:2px solid #1a1a1a;border-radius:30px;
    padding:4px 11px;color:#1a1a1a;letter-spacing:0.3px;
  }
  .dtag svg{flex-shrink:0;}

  /* description */
  .drawer-desc{
    font-size:13.5px;font-family:sans-serif;color:#333;
    line-height:1.7;margin-bottom:1.25rem;
  }

  /* what's included checklist */
  .drawer-includes{
    background:white;border:2.5px solid #1a1a1a;border-radius:16px;
    padding:14px 16px;margin-bottom:1.25rem;
  }
  .drawer-includes-title{
    font-size:11px;letter-spacing:2px;text-transform:uppercase;
    color:#888;font-family:sans-serif;margin-bottom:10px;
  }
  .inc-item{
    display:flex;align-items:center;gap:9px;
    font-size:13px;font-family:sans-serif;color:#333;
    padding:5px 0;border-bottom:1.5px dashed #eee;line-height:1.3;
  }
  .inc-item:last-child{border-bottom:none;}
  .inc-check{
    flex-shrink:0;width:18px;height:18px;
    background:#D4F1C4;border:2px solid #1a1a1a;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:10px;
  }

  /* CTA row */
  .drawer-cta{padding:0 1.5rem;}
  .d-add{
    width:100%;padding:15px;
    background:#FF6B6B;color:white;
    border:3.5px solid #1a1a1a;border-radius:50px;
    font-size:18px;font-family:'SuperMaples','Fredoka One',cursive;
    cursor:pointer;letter-spacing:1px;
    transition:transform 0.1s;
    text-shadow:1px 1px 0 rgba(0,0,0,0.18);
    margin-bottom:10px;
  }
  .d-add:hover{transform:scale(1.02);}
  .d-add.done{background:#1D9E75;border-color:#1D9E75;}
  .d-secure{display:flex;align-items:center;gap:5px;justify-content:center;font-size:11px;font-family:sans-serif;color:#aaa;}

  @media(max-width:480px){
    .brand{font-size:24px;}
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
    .hdr-top{flex-direction:column;gap:12px;align-items:flex-start;}
    .nav-item{font-size:9px;min-width:58px;}
    .drawer{border-radius:20px 20px 0 0;}
    .drawer-title{font-size:18px;}
    .drawer-price{font-size:24px;}
  }
</style>
</head>
<body>
<div class="page s">
  <div class="hdr">
    <div class="hdr-top">
      <div>
        <div class="brand">Primcore Studio</div>
        <div class="brand-sub">instant PDF downloads · print at home</div>
      </div>
      <button class="cart-pill" onclick="goCart()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Cart <span class="bubble" id="cc">0</span>
      </button>
    </div>
    <div class="nav">
      <div class="nav-item on" onclick="filt('all',this)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        All
      </div>
      <div class="nav-item" onclick="filt('patterns',this)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 3l2 6h6l-5 4 2 6-5-4-5 4 2-6-5-4h6z"/></svg>
        Patterns
      </div>
      <div class="nav-item" onclick="filt('worksheets',this)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>
        Worksheets
      </div>
      <div class="nav-item" onclick="filt('planners',this)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
        Planners
      </div>
      <div class="nav-item" onclick="filt('travel-guides',this)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>
        Travel
      </div>
      <div class="nav-item" onclick="filt('languages',this)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        Languages
      </div>
    </div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="divider"></div>

  <div class="cp">
    <div class="cp-hdr"><h3>Your cart</h3></div>
    <div class="cp-body">
      <div id="ecart" class="ecart">Nothing here yet — add something!</div>
      <div id="clist"></div>
      <div class="ctrow" id="ctrow" style="display:none">
        <span class="ctl">Total</span>
        <span class="cta" id="ctamt">$0</span>
      </div>
      <button class="ckbtn" id="ckbtn" style="display:none" onclick="checkout()">Checkout with Stripe →</button>
      <div class="pnote" id="pnote" style="display:none">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        Secure checkout · Instant PDF delivery
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════ PRODUCT DRAWER ═══════════════ -->
<div class="drawer-overlay" id="drawer-overlay" onclick="maybeCloseDrawer(event)">
  <div class="drawer" id="drawer">
    <div class="drawer-handle"></div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>

    <!-- A4 carousel -->
    <div class="carousel" id="car"
         onmousedown="dragStart(event)" ontouchstart="dragStart(event)"
         onmousemove="dragMove(event)" ontouchmove="dragMove(event)"
         onmouseup="dragEnd(event)" ontouchend="dragEnd(event)"
         onmouseleave="dragEnd(event)">
      <div class="carousel-track" id="car-track"></div>
      <button class="car-btn car-prev hidden" id="car-prev" onclick="carGo(-1)">&#8592;</button>
      <button class="car-btn car-next hidden" id="car-next" onclick="carGo(1)">&#8594;</button>
      <div class="car-dots" id="car-dots"></div>
      <div class="car-counter" id="car-counter"></div>
    </div>

    <!-- text content -->
    <div class="drawer-body">
      <div class="drawer-meta-row" id="d-meta-row"></div>
      <div class="drawer-title-row">
        <div class="drawer-title" id="d-title"></div>
        <div class="drawer-price" id="d-price"></div>
      </div>
      <div class="drawer-tags" id="d-tags"></div>
      <div class="drawer-desc" id="d-desc"></div>
      <div class="drawer-includes" id="d-includes"></div>
    </div>

    <div class="drawer-cta">
      <button class="d-add" id="d-add-btn">Add to cart</button>
      <div class="d-secure">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        Secure checkout · Instant PDF delivery after payment
      </div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// PRODUCTS
// images: array of filenames — first is the card thumbnail,
//         rest are extra A4 page previews. All go in public/
// tags:   { icon (emoji or svg string), label }
// includes: bullet points shown in the "what's included" box
// ─────────────────────────────────────────────────────────────
const products = [
  {
    id: 9, stripeId: 'apron-pattern',
    name: 'Gathering apron sewing pattern', cat: 'patterns', price: 11, isNew: false,
    images: ['thumb_apron_pattern.png','page2_apron_pattern.png','page3_apron_pattern.png'],
    tags: [
      {icon:'📄', label:'3 pages'},
      {icon:'🖨️', label:'Print at home'},
      {icon:'📐', label:'A4 & US Letter'},
      {icon:'⭐', label:'Beginner friendly'},
    ],
    desc: 'A pretty gathered apron with a harvest pouch pocket — perfect for gardening, crafting, or the kitchen. The pattern is clean and approachable with no fiddly zips or tricky closures.',
    includes: ['Full-size pattern pieces (print & cut)','8-step illustrated sewing instructions','Materials & notions list','Finished size guide: 70×50 cm'],
  },
  {
    id: 10, stripeId: 'kanji-n4',
    name: 'Japanese kanji practice worksheets', cat: 'worksheets', price: 6, isNew: true,
    images: ['thumb_kanji_n4.png','page2_kanji_n4.png','page3_kanji_n4.png'],
    tags: [
      {icon:'📄', label:'11 pages'},
      {icon:'🎌', label:'JLPT N4'},
      {icon:'✏️', label:'Trace & practice'},
      {icon:'🖨️', label:'Print at home'},
    ],
    desc: 'Structured worksheets covering all 104 JLPT N4 kanji, grouped 10 per page. Each character card gives you everything you need to learn and remember it — reading, meaning, stroke order, and practice space.',
    includes: ['104 kanji across 11 printable sheets','ON & kun readings for each character','Stroke order guide with numbered arrows','6 trace + freewrite practice squares per kanji','Printable in A4 or US Letter'],
  },
  {
    id: 1, stripeId: 'outfit-colouring',
    name: 'Outfit colouring book', cat: 'patterns', price: 5, isNew: false,
    images: ['outfitcolourcover.png','colour2.png','colour3.png'],
    tags: [
      {icon:'🎨', label:'Colouring book'},
      {icon:'📄', label:'24 pages'},
      {icon:'👗', label:'Fashion illustrations'},
      {icon:'🖨️', label:'Print at home'},
    ],
    desc: 'An outifit ootd colouring book packed with outfit illustrations — from cosy knitwear to elegant evening looks. Perfect for all ages, relaxing solo or as a creative activity with kids.',
    includes: ['24 unique outfit illustration pages','Mix of casual, formal & seasonal styles','Clean line art — no bleed-through on standard paper','A4 format, print as many copies as you like'],
  },
  {
    id: 2, stripeId: 'skirt-pattern',
    name: 'A-line skirt PDF pattern', cat: 'patterns', price: 9, isNew: false,
    images: ['thumb_skirt_pattern.png','page2_skirt_pattern.png','page3_skirt_pattern.png'],
    tags: [
      {icon:'📐', label:'Multi-size'},
      {icon:'⭐', label:'Beginner friendly'},
      {icon:'🖨️', label:'Print at home'},
      {icon:'📄', label:'4 pages'},
    ],
    desc: 'A timeless A-line skirt with a simple elastic waistband — the ideal first sewing project. Sizes range from XS to XL with clear grading lines so you can blend between sizes easily.',
    includes: ['Pattern pieces in sizes XS–XL','Elastic waistband — no zips needed','Step-by-step illustrated instructions','Fabric requirements chart','Print at home on A4 or tape together for full size'],
  },
  {
    id: 3, stripeId: 'habit-tracker',
    name: 'Daily habit tracker', cat: 'worksheets', price: 4, isNew: false,
    images: ['thumb_habit_tracker.png','page2_habit_tracker.png'],
    tags: [
      {icon:'📄', label:'1 page'},

// ─────────────────────────────────────────────────────────────
// Carousel state
// ─────────────────────────────────────────────────────────────
let carIdx = 0, carTotal = 0;
let dragX0 = null, dragX = null, isDragging = false;

function carBuild(images) {
  carIdx = 0; carTotal = images.length;
  const track = document.getElementById('car-track');
  track.innerHTML = images.map(src =>
    `<div class="carousel-slide"><img src="${src}" alt=""/></div>`
  ).join('');
  track.style.transform = 'translateX(0)';

  const dots = document.getElementById('car-dots');
  dots.innerHTML = images.length > 1
    ? images.map((_,i) => `<div class="car-dot${i===0?' on':''}" onclick="carGoTo(${i})"></div>`).join('')
    : '';

  document.getElementById('car-prev').classList.toggle('hidden', carTotal <= 1);
  document.getElementById('car-next').classList.toggle('hidden', carTotal <= 1);
  document.getElementById('car-counter').textContent = carTotal > 1 ? `1 / ${carTotal}` : '';
  carUpdateUI();
}

function carGoTo(i) {
  carIdx = Math.max(0, Math.min(i, carTotal - 1));
  carUpdateUI();
}

function carGo(dir) { carGoTo(carIdx + dir); }

function carUpdateUI() {
  document.getElementById('car-track').style.transform = `translateX(-${carIdx * 100}%)`;
  document.querySelectorAll('.car-dot').forEach((d,i) => d.classList.toggle('on', i === carIdx));
  document.getElementById('car-prev').classList.toggle('hidden', carIdx === 0 || carTotal <= 1);
  document.getElementById('car-next').classList.toggle('hidden', carIdx === carTotal - 1 || carTotal <= 1);
  if (carTotal > 1) document.getElementById('car-counter').textContent = `${carIdx+1} / ${carTotal}`;
}

// drag / swipe
function dragStart(e) {
  isDragging = true;
  dragX0 = e.touches ? e.touches[0].clientX : e.clientX;
  dragX = dragX0;
}
function dragMove(e) {
  if (!isDragging) return;
  dragX = e.touches ? e.touches[0].clientX : e.clientX;
}
function dragEnd(e) {
  if (!isDragging) return;
  isDragging = false;
  const diff = dragX0 - dragX;
  if (Math.abs(diff) > 40) carGo(diff > 0 ? 1 : -1);
}

// ─────────────────────────────────────────────────────────────
// Drawer open / close
// ─────────────────────────────────────────────────────────────
function openDrawer(id) {
  const p = products.find(x => x.id === id);
  // carousel
  carBuild(p.images);

  // meta row
  document.getElementById('d-meta-row').innerHTML =
    `<span class="d-cat">${p.cat.replace(/-/g,' ')}</span>` +
    (p.isNew ? `<span class="d-new">NEW</span>` : '');

  // title + price
  document.getElementById('d-title').textContent = p.name;
  document.getElementById('d-price').textContent = `$${p.price}`;

  // tags
  document.getElementById('d-tags').innerHTML = (p.tags || []).map(t =>
    `<span class="dtag">${t.icon} ${t.label}</span>`
  ).join('');

  // description
  document.getElementById('d-desc').textContent = p.desc;

  // includes
  document.getElementById('d-includes').innerHTML =
    `<div class="drawer-includes-title">What's included</div>` +
    (p.includes || []).map(item =>
      `<div class="inc-item"><span class="inc-check">✓</span>${item}</div>`
    ).join('');

  // CTA button
  const btn = document.getElementById('d-add-btn');
  const inCart = !!cart.find(c => c.id === id);
  btn.textContent = inCart ? 'Already in cart ✓' : 'Add to cart';
  btn.className = 'd-add' + (inCart ? ' done' : '');
  btn.onclick = () => {
    addC(id);
    const nowIn = !!cart.find(c => c.id === id);
    btn.textContent = 'Added ✓';
    btn.className = 'd-add done';
  };

  document.getElementById('drawer-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function maybeCloseDrawer(e) {
  if (e.target === document.getElementById('drawer-overlay')) closeDrawer();
}

// ─────────────────────────────────────────────────────────────
// Grid
// ─────────────────────────────────────────────────────────────
let cart = [], curFilt = 'all';

function renderGrid(f) {
  const g = document.getElementById('grid');
  const list = f === 'all' ? products : products.filter(p => p.cat === f);
  g.innerHTML = list.map(p => {
    const inCart = !!cart.find(c => c.id === p.id);
    return `<div class="card" onclick="openDrawer(${p.id})">
      <div class="thumb">
        <img src="${p.images[0]}" alt="${p.name}"/>
        ${p.isNew ? '<span class="nb">NEW</span>' : ''}
      </div>
      <div class="ci">
        <div class="ccat">${p.cat.replace(/-/g,' ')}</div>
        <div class="cname">${p.name}</div>
        <div class="cfoot">
          <span class="price">$${p.price}</span>
          <button class="abtn${inCart?' done':''}" onclick="event.stopPropagation();addC(${p.id})">${inCart?'✓':'+'}</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function filt(f, btn) {
  curFilt = f;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderGrid(f);
}

function addC(id) {
  if (!cart.find(c => c.id === id)) {
    cart.push(products.find(p => p.id === id));
    renderGrid(curFilt);
    renderCart();
    document.getElementById('cc').textContent = cart.length;
  }
}

// ─────────────────────────────────────────────────────────────
// Cart
// ─────────────────────────────────────────────────────────────
function renderCart() {
  const ec = document.getElementById('ecart'), cl = document.getElementById('clist'),
    tr = document.getElementById('ctrow'), cb = document.getElementById('ckbtn'),
    pn = document.getElementById('pnote');
  if (!cart.length) {
    ec.style.display='block'; cl.innerHTML='';
    tr.style.display='none'; cb.style.display='none'; pn.style.display='none';
    return;
  }
  ec.style.display = 'none';
  cl.innerHTML = cart.map(p =>
    `<div class="citem">
      <div><div class="cin">${p.name}</div><div class="csub">PDF download · instant delivery</div></div>
      <span class="cpr">$${p.price}</span>
    </div>`
  ).join('');
  document.getElementById('ctamt').textContent = '$' + cart.reduce((s,p) => s+p.price, 0);
  tr.style.display='flex'; cb.style.display='block'; pn.style.display='flex';
}

function goCart() {
  document.querySelector('.cp').scrollIntoView({ behavior:'smooth', block:'start' });
}

function checkout() {
  if (!cart.length) return;
  fetch('/create-checkout-session', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ items: cart.map(p => ({ id: p.stripeId })) })
  })
    .then(r => r.json())
    .then(data => {
      if (data.url) window.location.href = data.url;
      else alert('Checkout error: ' + (data.error || 'unknown'));
    })
    .catch(() => alert('Network error. Is the server running?'));
}

renderGrid('all');
renderCart();
